name: Build site daily (pull fresh race data from Dropbox)

on:
  schedule:
    - cron: "0 1 * * *"  # 1am UTC every day (10am Japan time)
  workflow_dispatch:       # Also allows manual trigger from GitHub Actions tab

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r build/requirements.txt

      - name: Build site (fetch latest Dropbox data)
        run: python build/build.py

      - name: Commit if site content changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html sitemap.xml robots.txt
          git diff --staged --quiet || git commit -m "Auto-build: daily refresh from Dropbox Excel [skip ci]"
          git pull --rebase
          git push
