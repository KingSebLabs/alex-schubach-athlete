# ─── ABOUT ───────────────────────────────────────────────────────────────────
about:
  heading: "THE STORY<br>SO FAR"
  paragraphs:
    - "I've been an athlete for as long as I can remember. I grew up in the pool as a <strong>competitive swimmer</strong>, then moved to the track during my teenage years. That early foundation built something that has never left me — a deep commitment to <strong>discipline, consistency, and the pursuit of improvement</strong>."
    - "Today, my focus has shifted to <strong>endurance sports</strong> — trail running, road racing, and hybrid events like Hyrox. I'm drawn to the kind of challenges that test both physical and mental limits. For me, it's never just about the finish line. It's about what you become in the process."
    - "Beyond racing, I live an <strong>active outdoor lifestyle</strong> rooted in movement, adventure, and connection with nature. Every day is an opportunity to push a little further."
