    desc: "Consistency over time creates real results. Show up every day and trust the process."

# ─── MISSION ─────────────────────────────────────────────────────────────────
mission:
  quote: "My mission isn't simply to inspire people to be active. It's to show that <span>ordinary people can achieve extraordinary things</span> when they commit fully."
  body: "Through my races and my journey, I want to encourage people to realise their potential, find what they're passionate about, and push beyond what they think is possible."
  pillars:
    - "Realise your potential"
    - "Find your passion"
    - "Commit fully to it"
    - "Push beyond your limits"

